<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Produção Diária HBW</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111010">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0b0b0a; --card:#171512; --card2:#1f1c18; --line:#2b2620;
    --beige:#d8c9a3; --beige-dark:#b8a679; --white:#f5f2ea; --muted:#8f877a;
    --pos:#c9b98a; --neg:#a67c6a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,Roboto,Segoe UI,sans-serif;
    background:var(--bg); color:var(--white); min-height:100vh;
    padding:0 16px 40px;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 0 10px; border-bottom:1px solid var(--line); margin-bottom:16px;
  }
  .brand{display:flex; flex-direction:column; line-height:1.1;}
  .brand .word1{font-size:1.25rem; font-weight:800; letter-spacing:0.02em; color:var(--white);}
  .brand .word2{font-size:0.7rem; font-weight:600; letter-spacing:0.15em; color:var(--beige); text-transform:uppercase;}
  .menu-btn{
    background:var(--card2); border:1px solid var(--line); color:var(--beige);
    width:42px; height:42px; border-radius:10px; font-size:1.3rem; cursor:pointer;
  }
  .sub{color:var(--muted); font-size:0.85rem; margin-bottom:16px;}
  .card{
    background:var(--card); border-radius:16px; padding:18px; margin-bottom:14px;
    border:1px solid var(--line);
  }
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .stat-label{color:var(--muted); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:4px;}
  .stat-value{font-size:1.7rem; font-weight:800; color:var(--beige);}
  .stat-value.big{font-size:2.4rem;}
  .stat-unit{font-size:0.9rem; color:var(--muted); font-weight:400;}
  button{
    font-family:inherit; border:none; border-radius:12px; padding:14px 16px;
    font-size:1rem; font-weight:700; cursor:pointer;
  }
  .btn-primary{background:var(--beige); color:#1a1712; width:100%;}
  .btn-secondary{background:var(--card2); color:var(--white); width:100%; border:1px solid var(--line);}
  .btn-pausa-off{background:var(--card2); color:var(--white); border:1px solid var(--line);}
  .btn-pausa-on{background:var(--beige-dark); color:#1a1712;}
  .btn-danger{background:transparent; color:var(--neg); border:1px solid #3a2620;}
  input[type=number]{
    width:100%; padding:16px; font-size:1.6rem; border-radius:12px; border:2px solid var(--line);
    background:#0c0b09; color:var(--white); text-align:center; font-weight:700;
  }
  input[type=number]:focus{outline:none; border-color:var(--beige);}
  .history{max-height:220px; overflow-y:auto;}
  .history-item{
    display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line);
    font-size:0.9rem;
  }
  .history-item:last-child{border-bottom:none;}
  .history-time{color:var(--muted);}
  .history-delta{color:var(--pos); font-size:0.8rem;}
  .empty-state{text-align:center; padding:30px 10px; color:var(--muted);}
  .setup input{margin-bottom:14px;}
  .footer-note{color:var(--muted); font-size:0.75rem; text-align:center; margin-top:20px; line-height:1.5;}
  .toast{
    position:fixed; bottom:20px; left:16px; right:16px; background:var(--beige); color:#1a1712;
    padding:14px; border-radius:12px; font-weight:700; text-align:center;
    transform:translateY(100px); opacity:0; transition:all 0.3s; z-index:200;
  }
  .toast.show{transform:translateY(0); opacity:1;}
  .perm-banner{
    background:var(--card2); border:1px solid var(--beige-dark); color:var(--beige);
    padding:12px; border-radius:12px; font-size:0.85rem; margin-bottom:14px;
  }
  .perm-banner button{margin-top:8px; padding:10px; font-size:0.85rem;}

  /* Drawer menu */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:300;
    opacity:0; pointer-events:none; transition:opacity 0.25s;
  }
  .overlay.open{opacity:1; pointer-events:auto;}
  .drawer{
    position:fixed; top:0; right:0; bottom:0; width:82%; max-width:340px;
    background:var(--card); border-left:1px solid var(--line);
    transform:translateX(100%); transition:transform 0.25s; z-index:301;
    padding:20px; overflow-y:auto;
  }
  .drawer.open{transform:translateX(0);}
  .drawer h2{font-size:1rem; color:var(--beige); margin:18px 0 10px; text-transform:uppercase; letter-spacing:0.05em; font-size:0.78rem;}
  .drawer h2:first-child{margin-top:0;}
  .lang-toggle{display:flex; gap:8px; margin-bottom:6px;}
  .lang-toggle button{flex:1; padding:10px;}
  .lang-toggle button.active{background:var(--beige); color:#1a1712;}
  .lang-toggle button:not(.active){background:var(--card2); color:var(--white); border:1px solid var(--line);}
  .menu-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 0; border-bottom:1px solid var(--line); cursor:pointer; color:var(--white);
  }
  .menu-item .arrow{color:var(--muted);}
  .record-row{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line);}
  .record-row:last-child{border-bottom:none;}
  .record-val{color:var(--beige); font-weight:800;}
  .record-date{color:var(--muted); font-size:0.78rem;}
  .day-list-item{
    display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); cursor:pointer;
  }
  .close-drawer{background:var(--card2); border:1px solid var(--line); color:var(--white); width:36px; height:36px; border-radius:8px; float:right;}
  .back-link{color:var(--beige); margin-bottom:14px; display:inline-block; cursor:pointer; font-weight:700;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="word1">HolzBauWerk</span>
    <span class="word2">Schwarzwald</span>
  </div>
  <button class="menu-btn" id="btnMenu">☰</button>
</div>

<div class="sub" id="headerSub">…</div>

<div id="permBanner" class="perm-banner" style="display:none;"></div>

<div id="app"></div>

<div class="footer-note" id="footerNote"></div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <button class="close-drawer" id="btnCloseDrawer">✕</button>
  <div id="drawerContent"></div>
</div>

<script>
const STR = {
  pt: {
    firstLogTitle: 'Primeiro registo do dia',
    firstLogLabel: 'Valor atual do contador (metros)',
    firstLogBtn: 'Registar e começar turno',
    shiftLabel: 'Turno',
    startedAt: 'início às',
    shiftOver: 'turno terminado',
    totalToday: 'Total hoje',
    avgRate: 'Média m/hora',
    forecastLabel: 'Previsão até ao fim do turno',
    newLogLabel: 'Novo registo (valor total acumulado)',
    registerBtn: 'Registar',
    pausaOff: 'Marcar pausa de 30 min',
    pausaOn: '☕ Pausa registada (−30 min)',
    historyLabel: 'Histórico de hoje',
    noRecords: 'Sem registos',
    resetBtn: 'Terminar / limpar dia',
    footerNote: 'Nota: os lembretes horários funcionam melhor com a app aberta ou em segundo plano recente. Se o telemóvel poupar bateria de forma agressiva, abra a app de vez em quando para "apanhar" lembretes em atraso.',
    enableNotif: 'Ativar notificações',
    enableNotifBanner: 'Ative as notificações para receber o lembrete a cada hora.',
    invalidValue: 'Introduza um valor válido',
    logged: 'Registado',
    notifEnabled: 'Notificações ativadas',
    confirmReset: 'Limpar todos os registos de hoje?',
    reminderBody: 'Hora de registar o valor de metros!',
    menuLang: 'Idioma',
    menuHistory: 'Dias anteriores',
    menuRecords: 'Recordes',
    menuBack: '← Voltar',
    recordTotal: 'Recorde de produção diária',
    recordRate: 'Melhor média m/hora',
    noHistory: 'Ainda sem dias anteriores',
    noRecordsYet: 'Ainda sem dados suficientes',
    dayDetailTotal: 'Total',
    dayDetailAvg: 'Média m/h',
    dayDetailTurno: 'Turno'
  },
  de: {
    firstLogTitle: 'Erste Erfassung des Tages',
    firstLogLabel: 'Aktueller Zählerstand (Meter)',
    firstLogBtn: 'Erfassen und Schicht starten',
    shiftLabel: 'Schicht',
    startedAt: 'Start um',
    shiftOver: 'Schicht beendet',
    totalToday: 'Gesamt heute',
    avgRate: 'Ø Meter/Stunde',
    forecastLabel: 'Prognose bis Schichtende',
    newLogLabel: 'Neue Erfassung (Gesamtstand)',
    registerBtn: 'Erfassen',
    pausaOff: '30 Min. Pause markieren',
    pausaOn: '☕ Pause erfasst (−30 Min.)',
    historyLabel: 'Verlauf heute',
    noRecords: 'Keine Einträge',
    resetBtn: 'Tag beenden / löschen',
    footerNote: 'Hinweis: Stündliche Erinnerungen funktionieren am zuverlässigsten, wenn die App geöffnet ist oder kürzlich im Hintergrund lief. Bei aggressivem Akkusparen bitte die App gelegentlich öffnen, um verpasste Erinnerungen nachzuholen.',
    enableNotif: 'Benachrichtigungen aktivieren',
    enableNotifBanner: 'Aktivieren Sie Benachrichtigungen für die stündliche Erinnerung.',
    invalidValue: 'Bitte einen gültigen Wert eingeben',
    logged: 'Erfasst',
    notifEnabled: 'Benachrichtigungen aktiviert',
    confirmReset: 'Alle heutigen Einträge löschen?',
    reminderBody: 'Zeit, den Meterstand zu erfassen!',
    menuLang: 'Sprache',
    menuHistory: 'Vorherige Tage',
    menuRecords: 'Rekorde',
    menuBack: '← Zurück',
    recordTotal: 'Tagesproduktionsrekord',
    recordRate: 'Beste Ø Meter/Stunde',
    noHistory: 'Noch keine vorherigen Tage',
    noRecordsYet: 'Noch nicht genug Daten',
    dayDetailTotal: 'Gesamt',
    dayDetailAvg: 'Ø m/h',
    dayDetailTurno: 'Schicht'
  }
};

const SHIFTS = [
  { id: 'manha', label: '05:00–14:00', startH: 5, endH: 14 },
  { id: 'tarde', label: '14:00–23:00', startH: 14, endH: 23 }
];
const SHIFT_LENGTH_H = 9;
const BREAK_H = 0.5;
const DAY_PREFIX = 'prod-';

function lang() { return localStorage.getItem('app-lang') || 'pt'; }
function setLang(l) {
  localStorage.setItem('app-lang', l);
  if (swReg && swReg.active) swReg.active.postMessage({ type: 'SET_LANG', lang: l });
}
function t(key) { return STR[lang()][key]; }

function todayKey(d = new Date()) { return DAY_PREFIX + d.toISOString().slice(0,10); }
function loadState(key) {
  const raw = localStorage.getItem(key || todayKey());
  return raw ? JSON.parse(raw) : null;
}
function saveState(s) { localStorage.setItem(todayKey(), JSON.stringify(s)); }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }); }
function fmtDate(dateStr) {
  const [y,m,d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function detectShift(date) {
  const h = date.getHours() + date.getMinutes() / 60;
  for (const s of SHIFTS) if (h >= s.startH && h < s.endH) return s;
  return h < 5 ? SHIFTS[0] : SHIFTS[1];
}
function shiftStartDate(shift, refDate) {
  const d = new Date(refDate);
  d.setHours(shift.startH, 0, 0, 0);
  return d;
}

function computeDayStats(s) {
  const shiftStart = s.shiftStart;
  const lastLog = s.logs[s.logs.length - 1];
  const total = lastLog.value;
  const elapsedRealH = Math.min(Math.max((lastLog.time - shiftStart) / 3600000, 0), SHIFT_LENGTH_H);
  const effElapsedH = Math.max(elapsedRealH - (s.pausa ? BREAK_H : 0), 0.02);
  const rate = total / effElapsedH;
  return { total, rate, turnoLabel: s.turnoLabel };
}

function scanAllDays() {
  const days = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(DAY_PREFIX)) {
      const s = JSON.parse(localStorage.getItem(key));
      if (s && s.logs && s.logs.length) {
        days.push({ key, dateStr: key.slice(DAY_PREFIX.length), state: s });
      }
    }
  }
  days.sort((a,b) => b.dateStr.localeCompare(a.dateStr));
  return days;
}

let state = loadState();
let swReg = null;
let reminderTimeout = null;
let view = 'main'; // main | history | day-detail | records
let viewingDayKey = null;

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ---------- MAIN VIEW ----------
function renderMain() {
  const app = document.getElementById('app');
  const header = document.getElementById('headerSub');

  if (!state) {
    header.textContent = t('firstLogTitle');
    app.innerHTML = `
      <div class="card setup">
        <div class="stat-label">${t('firstLogLabel')}</div>
        <input type="number" id="firstValue" inputmode="numeric" step="1" min="0" placeholder="ex: 120">
        <button class="btn-primary" id="btnFirstLog">${t('firstLogBtn')}</button>
      </div>
    `;
    document.getElementById('btnFirstLog').onclick = () => {
      const val = parseInt(document.getElementById('firstValue').value, 10);
      if (isNaN(val) || val < 0) { showToast(t('invalidValue')); return; }
      const now = new Date();
      const shift = detectShift(now);
      state = {
        date: todayKey(), turnoId: shift.id, turnoLabel: shift.label,
        shiftStart: shiftStartDate(shift, now).getTime(), pausa: false,
        logs: [{ time: now.getTime(), value: val }], nextReminder: now.getTime() + 3600000
      };
      saveState(state);
      requestNotifPermissionIfNeeded();
      scheduleNextReminder();
      renderMain();
    };
    return;
  }

  const shift = SHIFTS.find(s => s.id === state.turnoId);
  const shiftStart = state.shiftStart;
  const shiftEnd = shiftStart + SHIFT_LENGTH_H * 3600000;
  const now = Date.now();
  const lastLog = state.logs[state.logs.length - 1];
  const totalMetros = lastLog.value;

  const elapsedRealH = Math.min(Math.max((now - shiftStart) / 3600000, 0), SHIFT_LENGTH_H);
  const effShiftH = SHIFT_LENGTH_H - (state.pausa ? BREAK_H : 0);
  const effElapsedH = Math.max(elapsedRealH - (state.pausa ? BREAK_H : 0), 0.02);
  const rate = totalMetros / effElapsedH;
  const remainingEffH = Math.max(effShiftH - effElapsedH, 0);
  const prediction = Math.round(totalMetros + rate * remainingEffH);
  const isShiftOver = now >= shiftEnd;

  header.innerHTML = `${t('shiftLabel')} <b>${state.turnoLabel}</b> · ${t('startedAt')} ${fmtTime(shiftStart)}${isShiftOver ? ' · <span style="color:var(--beige-dark)">' + t('shiftOver') + '</span>' : ''}`;

  const historyHtml = state.logs.slice().reverse().map((log, idx) => {
    const revIdx = state.logs.length - 1 - idx;
    const prev = revIdx > 0 ? state.logs[revIdx - 1].value : 0;
    const delta = log.value - prev;
    return `<div class="history-item">
      <span class="history-time">${fmtTime(log.time)}</span>
      <span>${log.value} m</span>
      <span class="history-delta">${revIdx > 0 ? (delta >= 0 ? '+' : '') + delta + ' m' : '—'}</span>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="card">
      <div class="grid2">
        <div>
          <div class="stat-label">${t('totalToday')}</div>
          <div class="stat-value big">${totalMetros}<span class="stat-unit"> m</span></div>
        </div>
        <div>
          <div class="stat-label">${t('avgRate')}</div>
          <div class="stat-value">${rate.toFixed(1)}<span class="stat-unit"> m/h</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="stat-label">${t('forecastLabel')} (${shift.label.split('–')[1]})</div>
      <div class="stat-value big">${prediction}<span class="stat-unit"> m</span></div>
    </div>

    <div class="card">
      <div class="stat-label">${t('newLogLabel')}</div>
      <input type="number" id="newValue" inputmode="numeric" step="1" min="0" placeholder="ex: ${totalMetros}">
      <button class="btn-primary" id="btnAddLog">${t('registerBtn')}</button>
    </div>

    <div class="card">
      <button class="${state.pausa ? 'btn-pausa-on' : 'btn-pausa-off'}" id="btnPausa" style="width:100%">
        ${state.pausa ? t('pausaOn') : t('pausaOff')}
      </button>
    </div>

    <div class="card">
      <div class="stat-label" style="margin-bottom:8px;">${t('historyLabel')}</div>
      <div class="history">${historyHtml || '<div class="empty-state">' + t('noRecords') + '</div>'}</div>
    </div>

    <button class="btn-danger" id="btnReset" style="width:100%; margin-top:6px;">${t('resetBtn')}</button>
  `;

  document.getElementById('btnAddLog').onclick = () => {
    const val = parseInt(document.getElementById('newValue').value, 10);
    if (isNaN(val) || val < 0) { showToast(t('invalidValue')); return; }
    addLog(val);
  };
  document.getElementById('btnPausa').onclick = () => {
    state.pausa = !state.pausa;
    saveState(state);
    renderMain();
  };
  document.getElementById('btnReset').onclick = () => {
    if (confirm(t('confirmReset'))) {
      localStorage.removeItem(todayKey());
      state = null;
      if (reminderTimeout) clearTimeout(reminderTimeout);
      renderMain();
    }
  };
}

function addLog(val) {
  const now = Date.now();
  state.logs.push({ time: now, value: val });
  saveState(state);
  showToast(t('logged') + ': ' + val + ' m');
  scheduleNextReminder(true);
  renderMain();
}

// ---------- REMINDERS ----------
function scheduleNextReminder(justLogged) {
  if (!state) return;
  const now = Date.now();
  const shiftEnd = state.shiftStart + SHIFT_LENGTH_H * 3600000;
  if (justLogged) { state.nextReminder = now + 3600000; saveState(state); }
  if (reminderTimeout) clearTimeout(reminderTimeout);
  if (state.nextReminder >= shiftEnd) return;
  const delay = Math.max(state.nextReminder - now, 1000);
  reminderTimeout = setTimeout(fireReminder, delay);
}

function fireReminder() {
  if (!state) return;
  if (swReg && Notification.permission === 'granted') {
    swReg.active && swReg.active.postMessage({ type: 'SHOW_LOG_REMINDER' });
  } else if (Notification.permission === 'granted') {
    new Notification(t('shiftLabel'), { body: t('reminderBody') });
  } else {
    showToast(t('reminderBody'));
  }
  state.nextReminder = Date.now() + 3600000;
  saveState(state);
  scheduleNextReminder(false);
}

function catchUpReminders() {
  if (!state) return;
  const shiftEnd = state.shiftStart + SHIFT_LENGTH_H * 3600000;
  const now = Date.now();
  if (state.nextReminder && state.nextReminder <= now && now < shiftEnd) fireReminder();
  else scheduleNextReminder(false);
}

function requestNotifPermissionIfNeeded() {
  const banner = document.getElementById('permBanner');
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    banner.style.display = 'block';
    banner.innerHTML = `${t('enableNotifBanner')}<button class="btn-primary" id="btnEnableNotif">${t('enableNotif')}</button>`;
    document.getElementById('btnEnableNotif').onclick = async () => {
      const perm = await Notification.requestPermission();
      if (perm === 'granted') { banner.style.display = 'none'; showToast(t('notifEnabled')); }
    };
  } else {
    banner.style.display = 'none';
  }
}

// ---------- DRAWER / MENU ----------
function openDrawer() {
  view = 'menu';
  renderDrawer();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function renderDrawer() {
  const content = document.getElementById('drawerContent');
  const L = lang();

  if (view === 'menu') {
    content.innerHTML = `
      <h2>${t('menuLang')}</h2>
      <div class="lang-toggle">
        <button class="${L==='pt'?'active':''}" id="langPt">Português</button>
        <button class="${L==='de'?'active':''}" id="langDe">Deutsch</button>
      </div>
      <h2>${t('menuHistory')}</h2>
      <div class="menu-item" id="goHistory"><span>${t('menuHistory')}</span><span class="arrow">›</span></div>
      <h2>${t('menuRecords')}</h2>
      <div class="menu-item" id="goRecords"><span>${t('menuRecords')}</span><span class="arrow">›</span></div>
    `;
    document.getElementById('langPt').onclick = () => { setLang('pt'); renderAll(); };
    document.getElementById('langDe').onclick = () => { setLang('de'); renderAll(); };
    document.getElementById('goHistory').onclick = () => { view = 'history'; renderDrawer(); };
    document.getElementById('goRecords').onclick = () => { view = 'records'; renderDrawer(); };
  }

  else if (view === 'history') {
    const days = scanAllDays().filter(d => d.key !== todayKey());
    const rows = days.map(d => {
      const stats = computeDayStats(d.state);
      return `<div class="day-list-item" data-key="${d.key}">
        <span>${fmtDate(d.dateStr)} · ${d.state.turnoLabel}</span>
        <span class="record-val">${stats.total} m</span>
      </div>`;
    }).join('');
    content.innerHTML = `
      <div class="back-link" id="backToMenu">${t('menuBack')}</div>
      <h2>${t('menuHistory')}</h2>
      ${rows || '<div class="empty-state">' + t('noHistory') + '</div>'}
    `;
    document.getElementById('backToMenu').onclick = () => { view = 'menu'; renderDrawer(); };
    content.querySelectorAll('.day-list-item').forEach(el => {
      el.onclick = () => { viewingDayKey = el.dataset.key; view = 'day-detail'; renderDrawer(); };
    });
  }

  else if (view === 'day-detail') {
    const s = loadState(viewingDayKey);
    const stats = computeDayStats(s);
    const dateStr = viewingDayKey.slice(DAY_PREFIX.length);
    const historyHtml = s.logs.map((log, i) => {
      const prev = i > 0 ? s.logs[i-1].value : 0;
      const delta = log.value - prev;
      return `<div class="history-item">
        <span class="history-time">${fmtTime(log.time)}</span>
        <span>${log.value} m</span>
        <span class="history-delta">${i > 0 ? (delta>=0?'+':'') + delta + ' m' : '—'}</span>
      </div>`;
    }).join('');
    content.innerHTML = `
      <div class="back-link" id="backToHistory">${t('menuBack')}</div>
      <h2>${fmtDate(dateStr)} · ${stats.turnoLabel}</h2>
      <div class="grid2" style="margin-bottom:14px;">
        <div><div class="stat-label">${t('dayDetailTotal')}</div><div class="stat-value">${stats.total} m</div></div>
        <div><div class="stat-label">${t('dayDetailAvg')}</div><div class="stat-value">${stats.rate.toFixed(1)} m/h</div></div>
      </div>
      <div class="history">${historyHtml}</div>
    `;
    document.getElementById('backToHistory').onclick = () => { view = 'history'; renderDrawer(); };
  }

  else if (view === 'records') {
    const days = scanAllDays();
    let bestTotal = null, bestRate = null;
    days.forEach(d => {
      const stats = computeDayStats(d.state);
      if (!bestTotal || stats.total > bestTotal.total) bestTotal = { ...stats, dateStr: d.dateStr };
      if (!bestRate || stats.rate > bestRate.rate) bestRate = { ...stats, dateStr: d.dateStr };
    });
    content.innerHTML = `
      <div class="back-link" id="backToMenu2">${t('menuBack')}</div>
      <h2>${t('menuRecords')}</h2>
      ${bestTotal ? `
        <div class="record-row">
          <div>
            <div class="stat-label">${t('recordTotal')}</div>
            <div class="record-date">${fmtDate(bestTotal.dateStr)} · ${bestTotal.turnoLabel}</div>
          </div>
          <div class="record-val">${bestTotal.total} m</div>
        </div>
        <div class="record-row">
          <div>
            <div class="stat-label">${t('recordRate')}</div>
            <div class="record-date">${fmtDate(bestRate.dateStr)} · ${bestRate.turnoLabel}</div>
          </div>
          <div class="record-val">${bestRate.rate.toFixed(1)} m/h</div>
        </div>
      ` : `<div class="empty-state">${t('noRecordsYet')}</div>`}
    `;
    document.getElementById('backToMenu2').onclick = () => { view = 'menu'; renderDrawer(); };
  }
}

function renderAll() {
  renderMain();
  requestNotifPermissionIfNeeded();
  document.getElementById('footerNote').textContent = t('footerNote');
  if (document.getElementById('drawer').classList.contains('open')) renderDrawer();
}

document.getElementById('btnMenu').onclick = openDrawer;
document.getElementById('btnCloseDrawer').onclick = closeDrawer;
document.getElementById('overlay').onclick = closeDrawer;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').then(reg => {
    swReg = reg;
    if (reg.active) reg.active.postMessage({ type: 'SET_LANG', lang: lang() });
  }).catch(() => {});

  navigator.serviceWorker.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'NOTIFICATION_LOG') {
      const val = parseInt(event.data.value, 10);
      if (!isNaN(val) && val >= 0 && state) addLog(val);
    }
  });
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') { catchUpReminders(); renderMain(); }
});

renderAll();
if (state) scheduleNextReminder(false);
setInterval(renderMain, 30000);
</script>
</body>
</html>
