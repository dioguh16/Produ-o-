<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HBW Diário</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c3b59e">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --paper:#ffffff; --paper2:#f4efe4; --line:#e2d8c4;
    --ink:#181511; --muted:#8a8074;
    --accent:#181511; --accent-dark:#000000; --accent-contrast:#ffffff;
    --beige:#c3b59e; --beige-dark:#a89877;
    --pos:#5c7a4a; --neg:#a24f3a; --amber:#c9932e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,Roboto,Segoe UI,sans-serif;
    background:var(--paper);
    color:var(--ink); min-height:100vh; min-height:100dvh; padding:0 16px 40px;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 0 10px; border-bottom:1px solid var(--line); margin-bottom:16px;
  }
  .brand{display:flex; align-items:center; min-height:34px;}
  .brand .word1{font-size:1.25rem; font-weight:800; letter-spacing:0.02em; color:var(--ink);}
  .brand .word2{font-size:0.7rem; font-weight:600; letter-spacing:0.15em; color:var(--beige-dark); text-transform:uppercase;}
  .menu-btn{
    background:var(--paper); border:1px solid var(--line); color:var(--accent);
    width:42px; height:42px; border-radius:10px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .hamburger{ display:flex; flex-direction:column; justify-content:space-between; width:18px; height:13px; }
  .hamburger i{ display:block; height:2px; width:100%; background:var(--accent); border-radius:1px; }
  .sub{color:var(--muted); font-size:0.85rem; margin-bottom:16px;}
  .card{
    background:var(--paper); border-radius:16px; padding:18px; margin-bottom:14px;
    border:1px solid var(--line); box-shadow:0 1px 3px rgba(60,45,20,0.06);
  }
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .stat-label{color:var(--beige-dark); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:4px; font-weight:700;}
  .stat-label::before{content:"// "; color:var(--beige-dark);}
  .stat-value{font-size:1.7rem; font-weight:800; color:var(--accent);}
  .stat-value.big{font-size:2.4rem;}
  .stat-unit{font-size:0.9rem; color:var(--muted); font-weight:400;}
  button{
    font-family:inherit; border:none; border-radius:12px; padding:14px 16px;
    font-size:1rem; font-weight:700; cursor:pointer;
  }
  .btn-primary{background:var(--accent); color:var(--accent-contrast); width:100%;}
  .btn-secondary{background:var(--paper2); color:var(--ink); width:100%; border:1px solid var(--line);}
  .btn-pausa-off{background:var(--paper2); color:var(--ink); border:1px solid var(--line);}
  .btn-pausa-on{background:var(--beige); color:var(--ink);}
  .btn-danger{background:transparent; color:var(--neg); border:1px solid #d9b3a3;}
  input[type=number], textarea{
    width:100%; padding:14px; font-size:1.1rem; border-radius:12px; border:2px solid var(--line);
    background:var(--paper); color:var(--ink); font-family:inherit;
  }
  input[type=number]{font-size:1.6rem; text-align:center; font-weight:700;}
  input[type=number]:focus, textarea:focus{outline:none; border-color:var(--accent);}
  textarea{resize:vertical; min-height:70px; font-weight:400; font-size:0.95rem;}
  .history{max-height:260px; overflow-y:auto;}
  .history-item{
    display:flex; align-items:center; justify-content:space-between; padding:8px 0;
    border-bottom:1px solid var(--line); font-size:0.9rem; gap:8px;
  }
  .history-item:last-child{border-bottom:none;}
  .history-time{color:var(--muted); flex-shrink:0;}
  .history-val{flex:1; text-align:right; padding-right:4px;}
  .history-delta{color:var(--pos); font-size:0.8rem; flex-shrink:0; min-width:48px; text-align:right;}
  .history-note{background:var(--paper2); border-radius:8px; padding:6px 8px;}
  .history-note-text{text-align:left; flex:1; white-space:normal; word-break:break-word; font-style:italic; color:var(--ink);}
  .history-actions{display:flex; gap:4px; flex-shrink:0;}
  .icon-btn{
    background:var(--paper2); border:1px solid var(--line); color:var(--ink);
    width:30px; height:30px; padding:0; border-radius:8px; font-size:0.85rem; line-height:1;
  }
  .icon-btn.delete{color:var(--neg);}
  .empty-state{text-align:center; padding:30px 10px; color:var(--muted);}
  .setup input{margin-bottom:14px;}
  .footer-note{color:var(--muted); font-size:0.75rem; text-align:center; margin-top:20px; line-height:1.5;}
  .toast{
    position:fixed; bottom:20px; left:16px; right:16px; background:var(--accent); color:var(--accent-contrast);
    padding:14px; border-radius:12px; font-weight:700; text-align:center;
    transform:translateY(100px); opacity:0; transition:all 0.3s; z-index:200;
  }
  .toast.show{transform:translateY(0); opacity:1;}
  .perm-banner{
    background:var(--paper2); border:1px solid var(--beige-dark); color:var(--ink);
    padding:12px; border-radius:12px; font-size:0.85rem; margin-bottom:14px;
  }
  .perm-banner button{margin-top:8px; padding:10px; font-size:0.85rem;}

  .overlay{
    position:fixed; inset:0; background:rgba(30,22,10,0.45); z-index:300;
    opacity:0; pointer-events:none; transition:opacity 0.25s;
  }
  .overlay.open{opacity:1; pointer-events:auto;}
  .drawer{
    position:fixed; top:0; right:0; bottom:0; width:82%; max-width:340px;
    background:var(--paper); border-left:1px solid var(--line);
    transform:translateX(100%); transition:transform 0.25s; z-index:301;
    padding:20px; overflow-y:auto;
  }
  .drawer.open{transform:translateX(0);}
  .drawer h2{color:var(--beige-dark); margin:18px 0 10px; text-transform:uppercase; letter-spacing:0.05em; font-size:0.78rem; font-weight:700;}
  .drawer h2::before{content:"// ";}
  .drawer h2:first-child{margin-top:0;}
  .lang-toggle{display:flex; gap:8px; margin-bottom:6px;}
  .lang-toggle button{flex:1; padding:10px;}
  .lang-toggle button.active{background:var(--accent); color:var(--accent-contrast);}
  .lang-toggle button:not(.active){background:var(--paper2); color:var(--ink); border:1px solid var(--line);}
  .menu-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 0; border-bottom:1px solid var(--line); cursor:pointer; color:var(--ink);
  }
  .menu-item .arrow{color:var(--muted);}
  .record-row{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line);}
  .record-row:last-child{border-bottom:none;}
  .record-val{color:var(--accent); font-weight:800;}
  .record-date{color:var(--muted); font-size:0.78rem;}
  .day-list-item{
    display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); cursor:pointer;
  }
  .close-drawer{
    background:var(--paper2); border:1px solid var(--line); width:36px; height:36px; border-radius:8px; float:right;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .x-icon{ position:relative; width:14px; height:14px; }
  .x-icon i{ position:absolute; top:50%; left:0; width:100%; height:2px; background:var(--ink); border-radius:1px; }
  .x-icon i:first-child{ transform:translateY(-50%) rotate(45deg); }
  .x-icon i:last-child{ transform:translateY(-50%) rotate(-45deg); }
  .back-link{color:var(--accent); margin-bottom:14px; display:inline-block; cursor:pointer; font-weight:700;}
  .tiny-link{color:var(--muted); font-size:0.72rem; cursor:pointer; text-decoration:underline;}
  .tiny-note{color:var(--muted); font-size:0.72rem; line-height:1.4; margin-bottom:4px;}

  .switch{position:relative; display:inline-block; width:44px; height:26px; flex-shrink:0;}
  .switch input{opacity:0; width:0; height:0;}
  .switch .slider{
    position:absolute; cursor:pointer; inset:0; background:var(--line);
    border-radius:26px; transition:0.2s;
  }
  .switch .slider::before{
    content:""; position:absolute; height:20px; width:20px; left:3px; bottom:3px;
    background:#fff; border-radius:50%; transition:0.2s;
  }
  .switch input:checked + .slider{background:var(--beige-dark);}
  .switch input:checked + .slider::before{transform:translateX(18px);}

  .checkbox-row{display:flex; align-items:center; gap:10px; font-size:0.95rem; color:var(--ink); cursor:pointer;}
  .checkbox-row input[type=checkbox]{width:20px; height:20px; accent-color:var(--beige-dark); flex-shrink:0;}

  .splash{
    position:fixed; inset:0; background:#ffffff; z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity 0.4s ease;
  }
  .splash.hide{opacity:0; pointer-events:none;}
  .splash-icon{
    width:128px; height:128px; border-radius:20px;
  }
  .splash-brand{
    margin-top:16px; text-align:center; opacity:0;
    animation:splashFadeIn 0.5s ease forwards; animation-delay:0.25s;
  }
  .splash-brand .word1{display:block; font-size:1.4rem; font-weight:800; color:var(--ink);}
  .splash-brand .word2{display:block; font-size:0.75rem; font-weight:600; letter-spacing:0.15em; color:var(--beige-dark); text-transform:uppercase; margin-top:2px;}
  @keyframes splashFadeIn{ to{ opacity:1; } }

  .notes-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .note-card{
    background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:10px;
    cursor:pointer; overflow:hidden; position:relative;
  }
  .note-thumb{width:100%; height:80px; object-fit:cover; border-radius:8px; margin-bottom:6px; display:block;}
  .note-photo-badge{
    position:absolute; top:16px; right:16px; background:rgba(24,21,17,0.72); color:#fff;
    font-size:0.65rem; padding:2px 6px; border-radius:6px; font-weight:700;
  }
  .note-text{font-size:0.82rem; color:var(--ink); white-space:pre-wrap; max-height:4.4em; overflow:hidden; word-break:break-word;}
  .note-date{font-size:0.66rem; color:var(--muted); margin-top:6px;}
  .note-photos{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .note-photo-thumb{position:relative; width:72px; height:72px;}
  .note-photo-thumb img{width:100%; height:100%; object-fit:cover; border-radius:8px; border:1px solid var(--line);}
  .photo-remove{
    position:absolute; top:-6px; right:-6px; width:22px; height:22px; border-radius:50%;
    background:var(--ink); color:#fff; font-size:0.7rem; padding:0; line-height:1; border:2px solid var(--paper);
  }

  .bar-chart{position:relative; display:flex; align-items:flex-end; gap:6px; padding-top:18px; padding-bottom:0; overflow-x:auto; overflow-y:visible;}
  .bar-col{display:flex; flex-direction:column; align-items:center; min-width:26px; flex-shrink:0;}
  .bar-col .bar{width:16px; background:var(--beige); border-radius:4px 4px 0 0; min-height:2px;}
  .bar-col .bar-value{font-size:0.58rem; color:var(--ink); font-weight:700; margin-bottom:2px; white-space:nowrap;}
  .bar-labels{display:flex; gap:6px; margin-top:4px; overflow-x:auto;}
  .bar-label-item{min-width:26px; flex-shrink:0; text-align:center; font-size:0.6rem; color:var(--muted); white-space:nowrap;}
  .goal-line{position:absolute; left:0; right:0; border-top:2px dashed var(--ink); opacity:0.55; z-index:0;}

  .progress-track{width:100%; height:8px; background:var(--paper2); border-radius:6px; overflow:hidden; margin:2px 0 14px;}
  .progress-fill{height:100%; border-radius:6px; transition:width 0.3s;}
</style>
</head>

const GOAL_LOW = 16000;
function goalColor(val) {
  if (val < GOAL_LOW) return 'var(--neg)';
  if (val < DAILY_GOAL) return 'var(--amber)';
  return 'var(--pos)';
}
function periodGoalColor(total, goal) {
  if (goal <= 0) return 'var(--ink)';
  const lowThresh = goal * (GOAL_LOW / DAILY_GOAL);
  if (total < lowThresh) return 'var(--neg)';
  if (total < goal) return 'var(--amber)';
  return 'var(--pos)';
}
const DAY_PREFIX = 'prod-';

function lang() { return localStorage.getItem('app-lang') || 'pt'; }
function setLang(l) {
  localStorage.setItem('app-lang', l);
  if (swReg && swReg.active) swReg.active.postMessage({ type: 'SET_LANG', lang: l });
}
function t(key) { return STR[lang()][key]; }

function todayKey(d = new Date()) { return DAY_PREFIX + d.toISOString().slice(0,10); }
function loadState(key) {
  const raw = localStorage.getItem(key || todayKey());
  return raw ? JSON.parse(raw) : null;
}
function saveDayState(key, s) { localStorage.setItem(key, JSON.stringify(s)); }
function saveState(s) { saveDayState(todayKey(), s); }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }); }
function fmtDate(dateStr) {
  const [y,m,d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function detectShift(date) {
  const h = date.getHours() + date.getMinutes() / 60;
  for (const s of SHIFTS) if (h >= s.startH && h < s.endH) return s;
  return h < 5 ? SHIFTS[0] : SHIFTS[1];
}
function shiftStartDate(shift, refDate) {
  const d = new Date(refDate);
  d.setHours(shift.startH, 0, 0, 0);
  return d;
}

function computeDayStats(s) {
  const lastLog = s.logs[s.logs.length - 1];
  const total = lastLog.value;
  const effShiftH = (s.shiftLengthH || SHIFT_LENGTH_H) - (s.pausa ? BREAK_H : 0);
  const rate = total / effShiftH;
  return { total, rate, turnoLabel: s.turnoLabel, hoursEfetivas: effShiftH };
}

const NOTES_KEY = 'keep-notes';
function loadAllNotes() {
  try { return JSON.parse(localStorage.getItem(NOTES_KEY) || '[]'); } catch (e) { return []; }
}
function saveAllNotes(notes) {
  try { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); return true; }
  catch (e) { showToast(t('storageFull')); return false; }
}
function getNoteById(id) { return loadAllNotes().find(n => n.id === id) || null; }
function fmtDateTime(ts) {
  const d = new Date(ts);
  return fmtDate(todayKey(d).slice(DAY_PREFIX.length)) + ' ' + fmtTime(ts);
}
function escapeHtml(str) {
  return (str || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function compressImage(file, maxDim = 1000, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function scanAllDays() {
  const days = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(DAY_PREFIX)) {
      const s = JSON.parse(localStorage.getItem(key));
      if (s && s.logs && s.logs.length) days.push({ key, dateStr: key.slice(DAY_PREFIX.length), state: s });
    }
  }
  days.sort((a,b) => b.dateStr.localeCompare(a.dateStr));
  return days;
}

// ---------- SUMMARY (weekly/monthly) ----------
const WEEKDAY_LABELS = { pt: ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'], de: ['Mo','Di','Mi','Do','Fr','Sa','So'] };
const MONTH_NAMES = {
  pt: ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
  de: ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember']
};
function todayDateStr() { return new Date().toISOString().slice(0,10); }
function isoWeekNumber(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}
function addDaysStr(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}
function weekStartKey(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = (d.getDay() + 6) % 7; // 0=Mon..6=Sun
  d.setDate(d.getDate() - dow);
  return d.toISOString().slice(0,10);
}
function monthKeyOf(dateStr) { return dateStr.slice(0,7); }
function fmtMonthLabel(mk) {
  const [y,m] = mk.split('-');
  const idx = parseInt(m,10) - 1;
  return `${MONTH_NAMES[lang()][idx]} ${y}`;
}
function isDayClosed(d) { return d.key !== todayKey() || !!(d.state && d.state.closed); }

function allDayStats() {
  return scanAllDays().filter(isDayClosed).map(d => ({ dateStr: d.dateStr, ...computeDayStats(d.state) }));
}
function groupBy(list, keyFn) {
  const groups = {};
  list.forEach(d => {
    const k = keyFn(d.dateStr);
    if (!groups[k]) groups[k] = [];
    groups[k].push(d);
  });
  return groups;
}
function periodAgg(days) {
  const total = days.reduce((s,d) => s + d.total, 0);
  const hours = days.reduce((s,d) => s + d.hoursEfetivas, 0);
  return { total, rate: hours > 0 ? total / hours : 0 };
}

// ---------- BACKUP / RESTORE ----------
function exportCSV() {
  const days = scanAllDays().filter(isDayClosed).sort((a,b) => a.dateStr.localeCompare(b.dateStr));
  const header = ['Data','Turno','Total (m)','Media (m/h)','Horas efetivas','Pausa','Probeteile','Notas'];
  const rows = days.map(d => {
    const stats = computeDayStats(d.state);
    return [
      d.dateStr,
      d.state.turnoLabel,
      stats.total,
      stats.rate.toFixed(1),
      stats.hoursEfetivas.toFixed(2),
      d.state.pausa ? 'Sim' : 'Nao',
      d.state.probeteile ? 'Sim' : 'Nao',
      ((d.state.textNotes && d.state.textNotes.length)
        ? d.state.textNotes.map(n => `${fmtTime(n.time)} ${n.text}`).join(' | ')
        : (d.state.notes || '')
      ).replace(/\r?\n/g, ' ')
    ];
  });
  const escape = (v) => {
    const s = String(v);
    return /[";\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  };
  const csvLines = [header, ...rows].map(r => r.map(escape).join(';'));
  const csvContent = '\uFEFF' + csvLines.join('\r\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hbw-diario-${todayDateStr()}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function exportAllData() {

  document.body.appendChild(a);

  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

  const parsed = JSON.parse(jsonText);
  const data = parsed && parsed.data ? parsed.data : parsed;
  if (!data || typeof data !== 'object') throw new Error('invalid');
  Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
  return true;
}

function buildHistoryHtml(s) {
  const logs = (s.logs || []).map((log, i) => ({ type: 'log', time: log.time, value: log.value, idx: i }));
  const notes = (s.textNotes || []).map((n, i) => ({ type: 'note', time: n.time, text: n.text, idx: i }));
  const timeline = logs.concat(notes).sort((a,b) => a.time - b.time);

  return timeline.slice().reverse().map(item => {
    if (item.type === 'log') {
      const prevLogs = logs.filter(l => l.idx < item.idx);
      const prev = item.idx > 0 ? logs[item.idx - 1].value : 0;
      const delta = item.value - prev;
      return `<div class="history-item">
        <span class="history-time">${fmtTime(item.time)}</span>
        <span class="history-val">${item.value} m</span>
        <span class="history-delta">${item.idx > 0 ? (delta>=0?'+':'') + delta + ' m' : '—'}</span>
        <span class="history-actions">
          <button class="icon-btn edit-log" data-idx="${item.idx}">✎</button>
          <button class="icon-btn delete delete-log" data-idx="${item.idx}">🗑</button>
        </span>
      </div>`;
    }
    return `<div class="history-item history-note">
      <span class="history-time">${fmtTime(item.time)}</span>
      <span class="history-val history-note-text">📝 ${escapeHtml(item.text)}</span>
      <span class="history-actions">
        <button class="icon-btn edit-note" data-idx="${item.idx}">✎</button>
        <button class="icon-btn delete delete-note" data-idx="${item.idx}">🗑</button>
      </span>
    </div>`;
  }).join('');
}

  container.querySelectorAll('.edit-log').forEach(btn => {
    btn.onclick = () => editLog(dayKey, parseInt(btn.dataset.idx,10), isToday);
  });
  container.querySelectorAll('.delete-log').forEach(btn => {

  });
  container.querySelectorAll('.edit-note').forEach(btn => {
    btn.onclick = () => editNote(dayKey, parseInt(btn.dataset.idx,10), isToday);
  });
  container.querySelectorAll('.delete-note').forEach(btn => {

function addNoteEntry(text) {
  if (!state.textNotes) state.textNotes = [];
  state.textNotes.push({ time: Date.now(), text });
  saveState(state);
  renderMain();
}

function editNote(key, idx, isToday) {
  const s = isToday ? state : loadState(key);
  if (!s || !s.textNotes) return;
  const note = s.textNotes[idx];
  const val = prompt(t('editNotePrompt'), note.text);
  if (val === null || val.trim() === '') return;

  const d = new Date(note.time);
  const pad = (n) => String(n).padStart(2, '0');
  const timeDefault = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const timeVal = prompt(t('editNoteTimePrompt'), timeDefault);
  if (timeVal === null) return;
  const m = /^(\d{1,2}):(\d{2})$/.exec(timeVal.trim());
  if (!m) { showToast(t('invalidTime')); return; }
  const hh = parseInt(m[1],10), mm = parseInt(m[2],10);
  if (hh > 23 || mm > 59) { showToast(t('invalidTime')); return; }
  d.setHours(hh, mm, 0, 0);

  note.text = val.trim();
  note.time = d.getTime();
  if (isToday) { state = s; saveState(state); renderMain(); }
  else { saveDayState(key, s); if (key === todayKey()) state = s; renderDrawer(); }
}

function deleteNote(key, idx, isToday) {
  const s = isToday ? state : loadState(key);
  if (!s || !s.textNotes) return;
  if (!confirm(t('confirmDeleteNoteEntry'))) return;
  s.textNotes.splice(idx, 1);
  if (isToday) { state = s; saveState(state); renderMain(); }
  else { saveDayState(key, s); if (key === todayKey()) state = s; renderDrawer(); }
}

function editLog(key, idx, isToday) {
  const s = isToday ? state : loadState(key);
  if (!s) return;
  const current = s.logs[idx].value;
  const val = prompt(t('editPrompt'), current);
  if (val === null) return;
  const num = parseInt(val, 10);
  if (isNaN(num) || num < 0) { showToast(t('invalidValue')); return; }
  s.logs[idx].value = num;
  if (isToday) { state = s; saveState(state); renderMain(); }
  else { saveDayState(key, s); if (key === todayKey()) state = s; renderDrawer(); }
}

function deleteLog(key, idx, isToday) {
  const s = isToday ? state : loadState(key);
  if (!s) return;
  if (!confirm(t('confirmDeleteLog'))) return;
  s.logs.splice(idx, 1);
  if (s.logs.length === 0) {
    localStorage.removeItem(key);
    if (isToday) { state = null; if (reminderTimeout) clearTimeout(reminderTimeout); renderMain(); }
    else { if (key === todayKey()) state = null; view = 'history'; renderDrawer(); }
    return;
  }
  if (isToday) { state = s; saveState(state); renderMain(); }
  else { saveDayState(key, s); if (key === todayKey()) state = s; renderDrawer(); }
}

function editSchedule(key, isToday) {
  const s = isToday ? state : loadState(key);
  if (!s) return;
  const startD = new Date(s.shiftStart);
  const curLenH = s.shiftLengthH || SHIFT_LENGTH_H;
  const endD = new Date(s.shiftStart + curLenH * 3600000);
  const pad = (n) => String(n).padStart(2, '0');
  const startDefault = `${pad(startD.getHours())}:${pad(startD.getMinutes())}`;
  const endDefault = `${pad(endD.getHours())}:${pad(endD.getMinutes())}`;

  const startVal = prompt(t('promptStart'), startDefault);
  if (startVal === null) return;
  const endVal = prompt(t('promptEnd'), endDefault);
  if (endVal === null) return;

  const m1 = /^(\d{1,2}):(\d{2})$/.exec(startVal.trim());
  const m2 = /^(\d{1,2}):(\d{2})$/.exec(endVal.trim());
  if (!m1 || !m2) { showToast(t('invalidTime')); return; }
  const sh = parseInt(m1[1],10), sm = parseInt(m1[2],10);
  const eh = parseInt(m2[1],10), em = parseInt(m2[2],10);
  if (sh>23||sm>59||eh>23||em>59) { showToast(t('invalidTime')); return; }

  const newStart = new Date(startD);
  newStart.setHours(sh, sm, 0, 0);
  let lengthH = (eh + em/60) - (sh + sm/60);
  if (lengthH <= 0) lengthH += 24;
  if (lengthH <= 0 || lengthH > 16) { showToast(t('invalidTime')); return; }

  s.shiftStart = newStart.getTime();
  s.shiftLengthH = Math.round(lengthH * 100) / 100;
  s.turnoLabel = `${pad(sh)}:${pad(sm)}–${pad(eh)}:${pad(em)}`;

  if (isToday) { state = s; saveState(state); scheduleNextReminder(false); renderMain(); }
  else { saveDayState(key, s); if (key === todayKey()) state = s; renderDrawer(); }
}


function renderMain() {
  const app = document.getElementById('app');
  const header = document.getElementById('headerSub');

  if (!state) {
    header.textContent = t('firstLogTitle');
    app.innerHTML = `
      <div class="card setup">
        <div class="stat-label">${t('firstLogLabel')}</div>
        <input type="number" id="firstValue" inputmode="numeric" step="1" min="0" placeholder="ex: 120">
        <button class="btn-primary" id="btnFirstLog">${t('firstLogBtn')}</button>
      </div>
    `;
    document.getElementById('btnFirstLog').onclick = () => {
      const val = parseInt(document.getElementById('firstValue').value, 10);
      if (isNaN(val) || val < 0) { showToast(t('invalidValue')); return; }
      const now = new Date();
      const shift = detectShift(now);
      state = {
        date: todayKey(), turnoId: shift.id, turnoLabel: shift.label,
        shiftLengthH: SHIFT_LENGTH_H,
        shiftStart: shiftStartDate(shift, now).getTime(), pausa: false, notes: '',
        logs: [{ time: now.getTime(), value: val }], textNotes: [], nextReminder: now.getTime() + 3600000
      };
      saveState(state);
      requestNotifPermissionIfNeeded();
      scheduleNextReminder();
      renderMain();
    };
    return;
  }

  const shift = SHIFTS.find(s => s.id === state.turnoId);
  const shiftLengthH = state.shiftLengthH || SHIFT_LENGTH_H;
  const shiftStart = state.shiftStart;
  const shiftEnd = shiftStart + shiftLengthH * 3600000;
  const now = Date.now();
  const lastLog = state.logs[state.logs.length - 1];
  const totalMetros = lastLog.value;

  const elapsedRealH = Math.max((now - shiftStart) / 3600000, 0.02);
  const effShiftH = shiftLengthH - (state.pausa ? BREAK_H : 0);

  // Taxa e previsão de fim de turno: fixas com base na última leitura, não avançam com o relógio
  const hoursAtLastLog = Math.max((lastLog.time - shiftStart) / 3600000, 0.02);
  const rate = totalMetros / hoursAtLastLog;
  const remainingAtLastLogH = Math.max(effShiftH - hoursAtLastLog, 0);
  const prediction = Math.round(totalMetros + rate * remainingAtLastLogH);

  // Previsão para agora: usa a mesma taxa, mas avança com o tempo desde a última leitura
  const hoursSinceLastLog = Math.max((now - lastLog.time) / 3600000, 0);
  const predictedNow = Math.round(totalMetros + rate * hoursSinceLastLog);

  const isShiftOver = now >= shiftEnd;
  const weekNo = isoWeekNumber(todayDateStr());
  const closed = !!state.closed;
  const statusColor = goalColor(prediction);

  header.innerHTML = `${fmtDate(todayDateStr())} · ${t('weekLabel')} ${weekNo} · ${t('shiftLabel')} <b>${state.turnoLabel}</b>${closed ? ' · <span style="color:var(--accent)">' + t('shiftClosedBadge') + '</span>' : (isShiftOver ? ' · <span style="color:var(--accent)">' + t('shiftOver') + '</span>' : '')}`;

        </div>

          <div class="stat-label">${t('predictedNowLabel')}</div>
          <div class="stat-value">${predictedNow}m</div>

  document.getElementById('probeteileCheck').onchange = (e) => {
    state.probeteile = e.target.checked;
    saveState(state);
  };
  if (document.getElementById('btnEndShift')) {
    document.getElementById('btnEndShift').onclick = () => {
      if (confirm(t('confirmEndShift'))) {
        state.closed = true;
        saveState(state);
        if (reminderTimeout) clearTimeout(reminderTimeout);
        renderMain();
      }
    };
  }
  if (document.getElementById('btnReopenShift')) {
    document.getElementById('btnReopenShift').onclick = () => {
      if (confirm(t('confirmReopen'))) {
        state.closed = false;
        saveState(state);
        scheduleNextReminder(false);
        renderMain();
      }
    };
  }
  if (document.getElementById('btnEditSchedule')) {
    document.getElementById('btnEditSchedule').onclick = () => editSchedule(todayKey(), true);
  }
}

function addLog(val) {
  if (state.logs.length) {
    const lastVal = state.logs[state.logs.length - 1].value;
    if (val < lastVal && !confirm(t('lowerValueConfirm').replace('{v}', lastVal))) return;
  }
  const now = Date.now();
  state.logs.push({ time: now, value: val });
  saveState(state);
  showToast(t('logged') + ': ' + val + ' m');
  scheduleNextReminder(true);
  renderMain();
}

// ---------- REMINDERS ----------
function scheduleNextReminder(justLogged) {
  if (!state) return;
  const now = Date.now();
  const shiftEnd = state.shiftStart + (state.shiftLengthH || SHIFT_LENGTH_H) * 3600000;
  if (justLogged) { state.nextReminder = now + 3600000; saveState(state); }
  if (reminderTimeout) clearTimeout(reminderTimeout);
  if (state.nextReminder >= shiftEnd) return;
  const delay = Math.max(state.nextReminder - now, 1000);
  reminderTimeout = setTimeout(fireReminder, delay);
}

function fireReminder() {
  if (!state) return;
  if (notifPrefEnabled()) {
    if (swReg && Notification.permission === 'granted') {
      swReg.active && swReg.active.postMessage({ type: 'SHOW_LOG_REMINDER' });
    } else if (Notification.permission === 'granted') {
      new Notification(t('shiftLabel'), { body: t('reminderBody') });
    } else {
      showToast(t('reminderBody'));
    }
  }
  state.nextReminder = Date.now() + 3600000;
  saveState(state);
  scheduleNextReminder(false);
}

function catchUpReminders() {
  if (!state) return;
  const shiftEnd = state.shiftStart + (state.shiftLengthH || SHIFT_LENGTH_H) * 3600000;
  const now = Date.now();
  if (state.nextReminder && state.nextReminder <= now && now < shiftEnd) fireReminder();
  else scheduleNextReminder(false);
}

function requestNotifPermissionIfNeeded() {
  const banner = document.getElementById('permBanner');
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    banner.style.display = 'block';
    banner.innerHTML = `${t('enableNotifBanner')}<button class="btn-primary" id="btnEnableNotif">${t('enableNotif')}</button>`;
    document.getElementById('btnEnableNotif').onclick = async () => {
      const perm = await Notification.requestPermission();
      if (perm === 'granted') { banner.style.display = 'none'; showToast(t('notifEnabled')); }
    };
  } else {
    banner.style.display = 'none';
  }
}

// ---------- DRAWER / MENU ----------
function openDrawer() {
  view = 'menu';
  renderDrawer();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  history.pushState({ drawerOpen: true }, '');
}
function hideDrawerUI() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
function closeDrawer() {
  if (history.state && history.state.drawerOpen) {
    history.back(); // triggers popstate -> hideDrawerUI()
  } else {
    hideDrawerUI();
  }
}
window.addEventListener('popstate', () => {
  hideDrawerUI();
});

function renderDrawer() {
  const content = document.getElementById('drawerContent');
  const L = lang();

  if (view === 'menu') {
    content.innerHTML = `
      <h2>${t('menuLang')}</h2>
      <div class="lang-toggle">
        <button class="${L==='pt'?'active':''}" id="langPt">Português</button>
        <button class="${L==='de'?'active':''}" id="langDe">Deutsch</button>
      </div>
      <h2>${t('menuNotif')}</h2>
      <div class="menu-item" style="cursor:default;">
        <span>${t('notifToggleLabel')}</span>
        <label class="switch"><input type="checkbox" id="notifToggle" ${notifPrefEnabled()?'checked':''}><span class="slider"></span></label>
      </div>
      <div class="tiny-note">${t('notifHelpText')}</div>
      <h2>${t('menuHistory')}</h2>
      <div class="menu-item" id="goHistory"><span>${t('menuHistory')}</span><span class="arrow">›</span></div>
      <h2>${t('menuSummary')}</h2>
      <div class="menu-item" id="goSummary"><span>${t('menuSummary')}</span><span class="arrow">›</span></div>
      <h2>${t('menuRecords')}</h2>
      <div class="menu-item" id="goRecords"><span>${t('menuRecords')}</span><span class="arrow">›</span></div>
      <h2>${t('menuNotes')}</h2>
      <div class="menu-item" id="goNotes"><span>${t('menuNotes')}</span><span class="arrow">›</span></div>
      <h2>${t('menuData')}</h2>
      <div class="menu-item" id="goData"><span>${t('menuData')}</span><span class="arrow">›</span></div>
    `;
    document.getElementById('langPt').onclick = () => { setLang('pt'); renderAll(); };
    document.getElementById('langDe').onclick = () => { setLang('de'); renderAll(); };
    document.getElementById('notifToggle').onchange = (e) => setNotifPref(e.target.checked);
    document.getElementById('goHistory').onclick = () => { view = 'history'; renderDrawer(); };
    document.getElementById('goSummary').onclick = () => { view = 'summary'; renderDrawer(); };
    document.getElementById('goRecords').onclick = () => { view = 'records'; renderDrawer(); };
    document.getElementById('goNotes').onclick = () => { view = 'notes'; renderDrawer(); };
    document.getElementById('goData').onclick = () => { view = 'data'; renderDrawer(); };
  }

  else if (view === 'history') {
    const days = scanAllDays().filter(isDayClosed);
    const rows = days.map(d => {
      const stats = computeDayStats(d.state);
      return `<div class="day-list-item" data-key="${d.key}">
        <span>${fmtDate(d.dateStr)} · ${d.state.turnoLabel}</span>
        <span class="record-val">${stats.total} m</span>
      </div>`;
    }).join('');
    content.innerHTML = `
      <div class="back-link" id="backToMenu">${t('menuBack')}</div>
      <h2>${t('menuHistory')}</h2>
      ${rows || '<div class="empty-state">' + t('noHistory') + '</div>'}
    `;
    document.getElementById('backToMenu').onclick = () => { view = 'menu'; renderDrawer(); };
    content.querySelectorAll('.day-list-item').forEach(el => {
      el.onclick = () => { viewingDayKey = el.dataset.key; view = 'day-detail'; renderDrawer(); };
    });
  }

  else if (view === 'day-detail') {
    const s = loadState(viewingDayKey);
    if (!s) { view = 'history'; renderDrawer(); return; }
    const stats = computeDayStats(s);
    const dateStr = viewingDayKey.slice(DAY_PREFIX.length);
    content.innerHTML = `
      <div class="back-link" id="backToHistory">${t('menuBack')}</div>
      <h2>${fmtDate(dateStr)} · ${stats.turnoLabel}</h2>
      <div class="grid2" style="margin-bottom:14px;">
        <div><div class="stat-label">${t('dayDetailTotal')}</div><div class="stat-value">${stats.total} m</div></div>
        <div><div class="stat-label">${t('dayDetailAvg')}</div><div class="stat-value">${stats.rate.toFixed(1)} m/h</div></div>
      </div>
      <div style="margin-bottom:14px;"><div class="stat-label">${t('hoursLabel')}</div><div class="stat-value" style="font-size:1.1rem;">${stats.hoursEfetivas.toFixed(1)} h</div></div>
      <div class="stat-label" style="margin-bottom:8px;">${t('historyLabel')}</div>
      <div class="history" id="dayDetailHistory">${buildHistoryHtml(s) || '<div class="empty-state">' + t('noRecords') + '</div>'}</div>
      <div style="text-align:center; margin-top:14px;">
        <span class="tiny-link" id="btnEditScheduleDay">${t('editSchedule')}</span>
      </div>
    `;
    document.getElementById('backToHistory').onclick = () => { view = 'history'; renderDrawer(); };
    wireHistoryActions(document.getElementById('dayDetailHistory'), false, viewingDayKey);
    document.getElementById('btnEditScheduleDay').onclick = () => editSchedule(viewingDayKey, false);
  }

  else if (view === 'records') {
    const days = scanAllDays().filter(isDayClosed);
    let bestTotal = null, bestRate = null;
    days.forEach(d => {
      const stats = computeDayStats(d.state);
      if (!bestTotal || stats.total > bestTotal.total) bestTotal = { ...stats, dateStr: d.dateStr };
      if (!bestRate || stats.rate > bestRate.rate) bestRate = { ...stats, dateStr: d.dateStr };
    });
    content.innerHTML = `
      <div class="back-link" id="backToMenu2">${t('menuBack')}</div>
      <h2>${t('menuRecords')}</h2>
      ${bestTotal ? `
        <div class="record-row">
          <div>
            <div class="stat-label">${t('recordTotal')}</div>
            <div class="record-date">${fmtDate(bestTotal.dateStr)} · ${bestTotal.turnoLabel}</div>
          </div>
          <div class="record-val">${bestTotal.total} m</div>
        </div>
        <div class="record-row">
          <div>
            <div class="stat-label">${t('recordRate')}</div>
            <div class="record-date">${fmtDate(bestRate.dateStr)} · ${bestRate.turnoLabel}</div>
          </div>
          <div class="record-val">${bestRate.rate.toFixed(1)} m/h</div>
        </div>
      ` : `<div class="empty-state">${t('noRecordsYet')}</div>`}
    `;
    document.getElementById('backToMenu2').onclick = () => { view = 'menu'; renderDrawer(); };
  }

  else if (view === 'notes') {
    const notes = loadAllNotes().slice().sort((a,b) => b.updatedAt - a.updatedAt);
    const cardsHtml = notes.map(n => {
      const thumb = n.photos && n.photos.length ? `<img src="${n.photos[0]}" class="note-thumb">` : '';
      const extraPhotos = n.photos && n.photos.length > 1 ? `<div class="note-photo-badge">+${n.photos.length - 1} ${t('photosCount')}</div>` : '';
      return `<div class="note-card" data-id="${n.id}">
        ${thumb}${extraPhotos}
        <div class="note-text">${escapeHtml(n.text).slice(0,140)}</div>
        <div class="note-date">${fmtDateTime(n.updatedAt)}</div>
      </div>`;
    }).join('');
    content.innerHTML = `
      <div class="back-link" id="backToMenu3">${t('menuBack')}</div>
      <h2>${t('menuNotes')}</h2>
      <button class="btn-primary" id="btnNewNote" style="margin-bottom:14px;">${t('newNote')}</button>
      <div class="notes-grid">${cardsHtml || '<div class="empty-state" style="grid-column:1/-1;">' + t('noNotes') + '</div>'}</div>
    `;
    document.getElementById('backToMenu3').onclick = () => { view = 'menu'; renderDrawer(); };
    document.getElementById('btnNewNote').onclick = () => { editingNoteId = null; editingPhotos = []; view = 'note-edit'; renderDrawer(); };
    content.querySelectorAll('.note-card').forEach(el => {
      el.onclick = () => {
        editingNoteId = el.dataset.id;
        const n = getNoteById(editingNoteId);
        editingPhotos = n ? [...(n.photos || [])] : [];
        view = 'note-edit';
        renderDrawer();
      };
    });
  }

  else if (view === 'note-edit') {
    const note = editingNoteId ? getNoteById(editingNoteId) : null;
    content.innerHTML = `
      <div class="back-link" id="backToNotes">${t('menuBack')}</div>
      <textarea id="noteText" placeholder="${t('notePlaceholder')}" style="min-height:130px;">${note ? escapeHtml(note.text) : ''}</textarea>
      <div class="note-photos" id="notePhotos"></div>
      <button class="btn-secondary" id="btnAddPhoto" style="margin-top:10px;">${t('addPhoto')}</button>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none;">
      <div style="display:flex; gap:10px; margin-top:16px;">
        <button class="btn-primary" id="btnSaveNote" style="flex:1;">${t('saveNote')}</button>
      </div>
      ${editingNoteId ? `<button class="btn-danger" id="btnDeleteNote" style="width:100%; margin-top:10px;">${t('deleteNote')}</button>` : ''}
    `;
    renderNotePhotosUI();
    document.getElementById('backToNotes').onclick = () => { view = 'notes'; renderDrawer(); };
    document.getElementById('btnAddPhoto').onclick = () => document.getElementById('photoInput').click();
    document.getElementById('photoInput').onchange = async (e) => {
      const files = Array.from(e.target.files || []);
      for (const f of files) {
        try { editingPhotos.push(await compressImage(f)); } catch (err) {}
      }
      renderNotePhotosUI();
      e.target.value = '';
    };
    document.getElementById('btnSaveNote').onclick = () => {
      const text = document.getElementById('noteText').value.trim();
      if (!text && editingPhotos.length === 0) { showToast(t('emptyNote')); return; }
      const notes = loadAllNotes();
      const now = Date.now();
      if (editingNoteId) {
        const idx = notes.findIndex(n => n.id === editingNoteId);
        if (idx > -1) { notes[idx].text = text; notes[idx].photos = editingPhotos; notes[idx].updatedAt = now; }
      } else {
        notes.push({ id: 'note-' + now + '-' + Math.random().toString(36).slice(2,7), text, photos: editingPhotos, createdAt: now, updatedAt: now });
      }
      if (saveAllNotes(notes)) { view = 'notes'; renderDrawer(); }
    };
    if (editingNoteId) {
      document.getElementById('btnDeleteNote').onclick = () => {
        if (!confirm(t('confirmDeleteNote'))) return;
        const notes = loadAllNotes().filter(n => n.id !== editingNoteId);
        saveAllNotes(notes);
        view = 'notes';
        renderDrawer();
      };
    }
  }

  else if (view === 'summary') {
    const list = allDayStats();
    const isWeek = summaryMode === 'week';
    const keyFn = isWeek ? weekStartKey : monthKeyOf;
    const groups = groupBy(list, keyFn);
    const currentKey = keyFn(todayDateStr());
    const currentDays = groups[currentKey] || [];
    const currentAgg = periodAgg(currentDays);
    const periodGoal = currentDays.length * DAILY_GOAL;
    const periodPct = periodGoal > 0 ? Math.min(100, Math.round((currentAgg.total / periodGoal) * 100)) : 0;

    let chartData;
    if (isWeek) {
      const labels = WEEKDAY_LABELS[lang()];
      chartData = [];
      for (let i = 0; i < 7; i++) {
        const ds = addDaysStr(currentKey, i);
        const entry = currentDays.find(d => d.dateStr === ds);
        chartData.push({ label: labels[i], value: entry ? entry.total : 0 });
      }
    } else {
      chartData = currentDays.slice().sort((a,b) => a.dateStr.localeCompare(b.dateStr))
        .map(d => ({ label: d.dateStr.slice(8,10), value: d.total }));
    }
    const TRACK_H = 100;
    const maxVal = Math.max(DAILY_GOAL, ...chartData.map(c => c.value), 1);
    const goalPx = Math.round((DAILY_GOAL / maxVal) * TRACK_H);
    const chartHtml = chartData.length ? `
      <div class="bar-chart">
        <div class="goal-line" style="bottom:${goalPx}px"></div>
        ${chartData.map(c =>
          `<div class="bar-col">
            <div class="bar-value">${c.value || ''}</div>
            <div class="bar" style="height:${c.value ? Math.max(2, Math.round((c.value/maxVal)*TRACK_H)) : 0}px; background:${c.value ? goalColor(c.value) : 'var(--line)'}" title="${c.value} m"></div>
          </div>`
        ).join('')}
      </div>
      <div class="bar-labels">${chartData.map(c => `<div class="bar-label-item">${c.label}</div>`).join('')}</div>
    ` : '';

    const otherKeys = Object.keys(groups).filter(k => k !== currentKey).sort().reverse().slice(0, 10);
    const prevRows = otherKeys.map(k => {
      const agg = periodAgg(groups[k]);
      const label = isWeek ? `${fmtDate(k)} – ${fmtDate(addDaysStr(k,6))}` : fmtMonthLabel(k);
      return `<div class="record-row">
        <div><div class="stat-label" style="margin:0;">${label}</div></div>
        <div style="text-align:right;">
          <div class="record-val">${agg.total} m</div>
          <div class="record-date">${agg.rate.toFixed(1)} m/h</div>
        </div>
      </div>`;
    }).join('');

    content.innerHTML = `
      <div class="back-link" id="backToMenuS">${t('menuBack')}</div>
      <h2>${t('menuSummary')}</h2>
      <div class="lang-toggle">
        <button class="${isWeek?'active':''}" id="tabWeek">${t('tabWeek')}</button>
        <button class="${!isWeek?'active':''}" id="tabMonth">${t('tabMonth')}</button>
      </div>
      <div class="grid2" style="margin:14px 0;">
        <div>
          <div class="stat-label">${t('summaryTotal')}</div>
          <div class="stat-value"><span style="color:${periodGoalColor(currentAgg.total, periodGoal)}">${currentAgg.total}m</span>${periodGoal > 0 ? `<span class="stat-unit"> / ${periodGoal}m</span>` : ''}</div>
        </div>
        <div><div class="stat-label">${t('summaryAvg')}</div><div class="stat-value">${currentAgg.rate.toFixed(1)} m/h</div></div>
      </div>
      ${periodGoal > 0 ? `<div class="progress-track"><div class="progress-fill" style="width:${periodPct}%; background:${periodGoalColor(currentAgg.total, periodGoal)}"></div></div>` : ''}
      ${chartHtml || '<div class="empty-state">' + t('summaryNoData') + '</div>'}
      <h2 style="margin-top:20px;">${t('previousPeriods')}</h2>
      ${prevRows || '<div class="empty-state">' + t('noHistory') + '</div>'}
    `;
    document.getElementById('backToMenuS').onclick = () => { view = 'menu'; renderDrawer(); };
    document.getElementById('tabWeek').onclick = () => { summaryMode = 'week'; renderDrawer(); };
    document.getElementById('tabMonth').onclick = () => { summaryMode = 'month'; renderDrawer(); };
  }

  else if (view === 'data') {
    content.innerHTML = `
      <div class="back-link" id="backToMenuD">${t('menuBack')}</div>
      <h2>${t('menuData')}</h2>
      <div class="tiny-note" style="margin-bottom:14px;">${t('dataExplain')}</div>
      <button class="btn-primary" id="btnExport" style="margin-bottom:10px;">${t('exportBtn')}</button>
      <button class="btn-secondary" id="btnExportCsv" style="margin-bottom:10px;">${t('exportCsvBtn')}</button>
      <button class="btn-secondary" id="btnImport">${t('importBtn')}</button>
      <input type="file" id="importInput" accept="application/json" style="display:none;">
    `;
    document.getElementById('backToMenuD').onclick = () => { view = 'menu'; renderDrawer(); };
    document.getElementById('btnExport').onclick = () => exportAllData();
    document.getElementById('btnExportCsv').onclick = () => exportCSV();
    document.getElementById('btnImport').onclick = () => document.getElementById('importInput').click();
    document.getElementById('importInput').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (!confirm(t('importWarning'))) { e.target.value = ''; return; }
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          importAllData(ev.target.result);
          showToast(t('importSuccess'));
          setTimeout(() => window.location.reload(), 1200);
        } catch (err) {
          showToast(t('importError'));
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    };
  }
}

function renderNotePhotosUI() {
  const container = document.getElementById('notePhotos');
  if (!container) return;
  container.innerHTML = editingPhotos.map((src, i) => `
    <div class="note-photo-thumb">
      <img src="${src}">
      <button class="photo-remove" data-i="${i}">✕</button>
    </div>
  `).join('');
  container.querySelectorAll('.photo-remove').forEach(btn => {
    btn.onclick = () => { editingPhotos.splice(parseInt(btn.dataset.i, 10), 1); renderNotePhotosUI(); };
  });
}

function renderAll() {
  renderMain();
  requestNotifPermissionIfNeeded();
  document.getElementById('footerNote').textContent = t('footerNote');
  if (document.getElementById('drawer').classList.contains('open')) renderDrawer();
}

document.getElementById('btnMenu').onclick = openDrawer;
document.getElementById('btnCloseDrawer').onclick = closeDrawer;
document.getElementById('overlay').onclick = closeDrawer;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').then(reg => {
    swReg = reg;
    if (reg.active) reg.active.postMessage({ type: 'SET_LANG', lang: lang() });
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if (newWorker) newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'activated') window.location.reload();
      });
    });
  }).catch(() => {});

  let refreshedOnce = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshedOnce) return;
    refreshedOnce = true;
    window.location.reload();
  });

  navigator.serviceWorker.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'NOTIFICATION_LOG') {
      const val = parseInt(event.data.value, 10);
      if (!isNaN(val) && val >= 0 && state) addLog(val);
    }
  });
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') { catchUpReminders(); renderMain(); }
});

renderAll();
if (state) scheduleNextReminder(false);
setInterval(() => {
  const active = document.activeElement;
  const isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');
  if (!isTyping) renderMain();
}, 30000);

setTimeout(() => {
  const splash = document.getElementById('splashScreen');
  if (splash) {
    splash.classList.add('hide');
    setTimeout(() => splash.remove(), 450);
  }
}, 1300);
</script>
